<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave a Review | Pitch Review London</title>
  <meta name="description" content="Submit a review for a 5-a-side football pitch in London." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="logo">Pitch Review London</a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="pitches.html">Pitches</a></li>
          <li><a href="review.html" class="active">Leave a Review</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container section">
    <div class="section-heading">
      <h1>Leave a review</h1>
      <p>Submit your experience for a London 5-a-side pitch.</p>
    </div>

    <form id="reviewForm" class="review-form card">
      <label for="reviewer_name">Your name</label>
      <input
        type="text"
        id="reviewer_name"
        name="reviewer_name"
        placeholder="Optional"
      />

      <label for="pitch_id">Pitch ID</label>
      <input
        type="number"
        id="pitch_id"
        name="pitch_id"
        placeholder="e.g. 1"
        required
      />

      <label for="quality_of_opposition">Quality of opposition (1-5)</label>
      <select id="quality_of_opposition" name="quality_of_opposition" required>
        <option value="">Select a score</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>

      <label for="quality_of_pitch">Quality of pitch (1-5)</label>
      <select id="quality_of_pitch" name="quality_of_pitch" required>
        <option value="">Select a score</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>

      <label for="price_per_team_per_game">Price per team per game (£)</label>
      <input
        type="number"
        step="0.01"
        id="price_per_team_per_game"
        name="price_per_team_per_game"
        placeholder="e.g. 35.00"
        required
      />

      <label for="overall_experience">Overall experience (1-5)</label>
      <select id="overall_experience" name="overall_experience" required>
        <option value="">Select a score</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>

      <button type="submit" class="button">Submit review</button>

      <p id="formMessage" class="form-message"></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 Pitch Review London</p>
      <p>Built for 5-a-side players in London.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
